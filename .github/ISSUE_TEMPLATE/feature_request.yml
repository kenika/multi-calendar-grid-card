name: "✨ Feature request"
description: Propose an enhancement or new capability
labels: ["type:feature","needs triage"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ["low","medium","high"]
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues
          required: true
        - label: I can help test a PR
          required: false

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Explain the user need that this feature addresses.
      placeholder: "When I..., I want..., so that..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution / UX
      description: How should it work? (bullets welcome)
      placeholder: "- Add setting …\n- UI control …\n- Default …"
    validations:
      required: true

  - type: input
    id: yaml
    attributes:
      label: Example YAML (optional)
      placeholder: |
        type: custom:multi-calendar-grid-card
        # …
