name: build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ver: ${{ steps.meta.outputs.ver }}
      out: ${{ steps.meta.outputs.out }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps (lockfile required)
        run: npm ci

      - name: Determine version + filenames
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
            OUT="multi-calendar-grid-card_lit_v${VER}.js"
          else
            VER="$(git rev-parse --short HEAD)"
            OUT="multi-calendar-grid-card_lit_${VER}.js"
          fi
          echo "ver=${VER}" >> $GITHUB_OUTPUT
          echo "out=${OUT}" >> $GITHUB_OUTPUT

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run check

      - name: Build (inject version + versioned outfile)
        run: npm run build -- --define:__VERSION__=\"${{ steps.meta.outputs.ver }}\" --outfile=./dist/${{ steps.meta.outputs.out }}

      - name: Copy unversioned (stable)
        run: cp -f dist/${{ steps.meta.outputs.out }} dist/multi-calendar-grid-card.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: assets-${{ steps.meta.outputs.ver }}
          path: |
            dist/${{ steps.meta.outputs.out }}
            dist/${{ steps.meta.outputs.out }}.map
            dist/multi-calendar-grid-card.js

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: assets-${{ needs.build.outputs.ver }}
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ needs.build.outputs.out }}
            dist/${{ needs.build.outputs.out }}.map
            dist/multi-calendar-grid-card.js
