name: build

on:
  workflow_dispatch:
  push:
    branches: [ dev, main ]
    tags: [ "v*", "V*" ]     # Accept both lowercase and uppercase 'V'
  pull_request:
    branches: [ dev, main ]

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build / Lint / Typecheck
    runs-on: ubuntu-latest
    outputs:
      ver: ${{ steps.meta.outputs.ver }}
      out: ${{ steps.meta.outputs.out }}
      is_tag: ${{ steps.meta.outputs.is_tag }}
      is_dev: ${{ steps.meta.outputs.is_dev }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (CI)
        run: npm ci

      - name: Determine version + filenames
        id: meta
        shell: bash
        run: |
          REF="${GITHUB_REF}"

          # Tag? Support refs/tags/v* and refs/tags/V*
          if [[ "$REF" =~ ^refs/tags/[vV].* ]]; then
            TAG="${REF#refs/tags/}"
            VER="${TAG#[vV]}"  # strip leading v/V
            OUT="multi-calendar-grid-card_lit_v${VER}.js"
            IS_TAG="true"
            IS_DEV="false"
          else
            SHORT="$(git rev-parse --short HEAD)"
            if [[ "$REF" == "refs/heads/dev" ]]; then
              VER="dev-${SHORT}"
              IS_DEV="true"
            else
              VER="${SHORT}"
              IS_DEV="false"
            fi
            OUT="multi-calendar-grid-card_lit_${VER}.js"
            IS_TAG="false"
          fi

          echo "ver=${VER}"        >> "$GITHUB_OUTPUT"
          echo "out=${OUT}"        >> "$GITHUB_OUTPUT"
          echo "is_tag=${IS_TAG}"  >> "$GITHUB_OUTPUT"
          echo "is_dev=${IS_DEV}"  >> "$GITHUB_OUTPUT"

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run check

      - name: Build (inject version + versioned outfile)
        shell: bash
        run: |
          mkdir -p dist
          # IMPORTANT: pass __VERSION__ as a proper JSON string (quoted)
          npm run build -- --define:__VERSION__='"${{ steps.meta.outputs.ver }}"' --outfile=./dist/${{ steps.meta.outputs.out }}

      - name: Copy stable (prod)
        run: cp -f dist/${{ steps.meta.outputs.out }} dist/multi-calendar-grid-card.js

      - name: Copy dev (testing)
        run: |
          mkdir -p dist/dev
          cp -f dist/${{ steps.meta.outputs.out }} dist/dev/multi-calendar-grid-card.dev.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: assets-${{ steps.meta.outputs.ver }}
          path: |
            dist/${{ steps.meta.outputs.out }}
            dist/${{ steps.meta.outputs.out }}.map
            dist/multi-calendar-grid-card.js
            dist/dev/multi-calendar-grid-card.dev.js

  release:
    name: Publish Release (tags only)
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: assets-${{ needs.build.outputs.ver }}
          path: dist

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ needs.build.outputs.out }}
            dist/${{ needs.build.outputs.out }}.map
            dist/multi-calendar-grid-card.js
          overwrite_files: true
          generate_release_notes: true
          make_latest: true

  prerelease-dev:
    name: Update rolling Dev Pre-release (dev branch only)
    if: needs.build.outputs.is_dev == 'true'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: assets-${{ needs.build.outputs.ver }}
          path: dist

      - name: Update rolling dev prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: Dev Nightly (rolling)
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            dist/dev/multi-calendar-grid-card.dev.js
            dist/${{ needs.build.outputs.out }}
            dist/${{ needs.build.outputs.out }}.map
