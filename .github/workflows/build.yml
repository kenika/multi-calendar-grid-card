name: build

on:
  workflow_dispatch:       # enables the green “Run workflow” button
  push:
    branches: [ main ]     # runs when you commit to main
    tags: [ "v*" ]         # runs when you push a tag like v0.6.0
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: multi-calendar-grid-card
          path: dist/multi-calendar-grid-card.js

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: multi-calendar-grid-card
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/multi-calendar-grid-card.js
