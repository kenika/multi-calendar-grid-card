name: build

on:
  workflow_dispatch:       # enable manual runs
  push:
    branches: [ main ]     # run on commits to main
    tags: [ "v*" ]         # run on tags like v0.6.0
  pull_request:

permissions:
  contents: write          # needed for creating releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Works whether or not a lockfile exists
      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: multi-calendar-grid-card
          path: dist/multi-calendar-grid-card.js

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: multi-calendar-grid-card
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/multi-calendar-grid-card.js
