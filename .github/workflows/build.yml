name: build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      versioned_file: ${{ steps.meta.outputs.versioned_file }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps (lockfile required)
        run: npm ci

      - name: Determine version string
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "ver=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "ver=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Type-check
        run: npm run check

      - name: Build (inject version into bundle)
        run: npm run build -- --define:__VERSION__=\"${{ steps.ver.outputs.ver }}\"

      - name: Rename/copy outputs
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            OUT="multi-calendar-grid-card_lit_v${{ steps.ver.outputs.ver }}.js"
          else
            OUT="multi-calendar-grid-card_lit_${{ steps.ver.outputs.ver }}.js"
          fi
          cp dist/multi-calendar-grid-card.js "dist/${OUT}"
          # Keep an unversioned copy for HACS / stable URL
          cp dist/multi-calendar-grid-card.js "dist/multi-calendar-grid-card.js"
          echo "versioned_file=${OUT}" >> $GITHUB_OUTPUT

      - name: Upload (versioned)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.versioned_file }}
          path: dist/${{ steps.meta.outputs.versioned_file }}

      - name: Upload (unversioned for HACS)
        uses: actions/upload-artifact@v4
        with:
          name: multi-calendar-grid-card.js
          path: dist/multi-calendar-grid-card.js

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.versioned_file }}
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: multi-calendar-grid-card.js
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ needs.build.outputs.versioned_file }}
            dist/multi-calendar-grid-card.js
